<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo de Etiquetas en HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px
        }
        .etiqueta-item{
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .etiqueta-item a {
            text-decoration: none;
            color: #0056b3;
            font-weight: bold;
            font-size: 1.2em;
        }
        .etiqueta-item a:hover {
            text-decoration: underline;
        }
        .categoria{
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Catalogo de Etiquetas en HTML</h1>
    <p>
        Bienvenido al catálogo de etiquetas en HTML y sus ejemplos.
    </p>
    <div th:each="etiqueta : ${etiquetas}" class="etiqueta-item">
        <span class="categoria" th:text="'[' + ${etiqueta.categoria} + ']'"></span>
        <a th:href="@{/etiqueta/{nombre}(nombre=${etiqueta.nombre})}" th:text="'&lt;' + ${etiqueta.nombre} + '&gt;'" ></a>
        <span th:text="'-' + ${etiqueta.descripcion}"></span>
    </div>
</body>

    </div>

</html>
